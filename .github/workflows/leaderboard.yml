name: live-leaderboard

# Refresh the leaderboard on real market data through each US trading day and
# commit leaderboard.json (the site reads it). Hourly while the US market is open
# means the numbers genuinely move during the session (the daily bar's last price
# updates intraday) — not faked motion, just real marks. Manual run available too.
on:
  schedule:
    - cron: "0 13-22 * * 1-5" # hourly ~9:00–18:00 ET (pre-open through after-close), Mon–Fri (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet yfinance
      - name: Compute leaderboard
        run: python live_runner.py
      - name: Commit if changed
        run: |
          git config user.name "builderr-bot"
          git config user.email "noreply@builderr.ai"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "live leaderboard $(date -u +%FT%TZ)"
          git push
